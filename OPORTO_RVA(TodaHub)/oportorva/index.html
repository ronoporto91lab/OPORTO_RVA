<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodaHub Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Custom colors matching the design */
    .bg-todahub-cyan { background-color: #00FFFF; }
    .text-todahub-cyan { color: #00FFFF; }
    .bg-todahub-bg { background-color: #E0FFFF; }
  </style>
</head>
<body class="bg-todahub-bg min-h-screen font-sans flex flex-col justify-between">

  <header class="bg-todahub-cyan px-8 py-4 flex items-center justify-between border-b border-gray-300 shadow-sm">
    <div class="flex items-center space-x-3">
      <svg class="w-10 h-10 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="12" rx="2" />
        <circle cx="7" cy="18" r="3" />
        <circle cx="17" cy="18" r="3" />
        <path d="M12 3v12" />
      </svg>
      <span class="text-3xl font-extrabold tracking-tight text-black">TodaHub</span>
    </div>

    <nav class="flex items-center space-x-8 text-lg font-bold text-black">
      <a href="#" class="border-b-4 border-black pb-1">Home</a>
      <a href="#" class="hover:opacity-70">History</a>
      <a href="#" class="hover:opacity-70">Inbox</a>
      <a href="#" class="hover:opacity-70">Me</a>
      <a href="#" class="bg-black text-white px-6 py-2 rounded-full font-bold text-sm tracking-wide hover:bg-gray-800 transition">
        Login/Sign Up
      </a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto w-full p-8 grid grid-cols-1 lg:grid-cols-3 gap-8 items-start flex-grow">
    
    <div class="lg:col-span-2 space-y-6">
      <div class="bg-white rounded-3xl border-2 border-gray-300 shadow-md overflow-hidden relative">
        
        <div class="h-80 bg-slate-200 relative overflow-hidden bg-cover bg-center" style="background-image: url('map-bg.png');">
          
          <div class="absolute top-4 left-4 bg-white rounded-full border border-gray-400 shadow-md flex items-center px-4 py-2 w-72 z-10">
            <input type="text" placeholder="Search Location" class="w-full bg-transparent focus:outline-none text-sm font-semibold">
            <i class="fa-solid fa-magnifying-glass text-gray-500"></i>
          </div>

          <div class="absolute top-4 right-4 bg-white rounded-lg border border-gray-400 shadow-md p-1 flex flex-col space-y-1 z-10">
            <button class="w-8 h-8 flex items-center justify-center font-bold text-lg hover:bg-gray-100"><i class="fa-solid fa-expand text-sm text-gray-700"></i></button>
          </div>
          <div class="absolute bottom-4 right-4 bg-white rounded-lg border border-gray-400 shadow-md flex flex-col z-10 overflow-hidden">
            <button class="w-8 h-8 flex items-center justify-center font-bold text-lg border-b border-gray-200 hover:bg-gray-100">+</button>
            <button class="w-8 h-8 flex items-center justify-center font-bold text-lg hover:bg-gray-100">-</button>
          </div>

          <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
            <i class="fa-solid fa-location-dot text-red-500 text-4xl drop-shadow-md"></i>
            <div class="bg-white text-[10px] font-bold p-1 rounded shadow-sm border border-gray-300 text-center mt-1 whitespace-nowrap">
              Main Location/<br>Head Office
            </div>
          </div>
        </div>

        <div class="p-6 bg-white border-t-2 border-gray-100">
          <div class="w-16 h-2 bg-gray-400 rounded-full mx-auto mb-4"></div>
          
          <h2 class="text-2xl font-black text-black mb-4">Terminal Overview</h2>
          
          <div class="overflow-x-auto">
            <table class="w-full text-left font-bold text-gray-800">
              <thead>
                <tr class="text-gray-500 border-b border-gray-200 text-sm">
                  <th class="pb-3">Terminal</th>
                  <th class="pb-3">Status</th>
                  <th class="pb-3 text-center">Commuter's in Line</th>
                  <th class="pb-3 text-right">Avg. Wait Time</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100 text-base">
                <tr>
                  <td class="py-4 flex items-center space-x-2">
                    <i class="fa-solid fa-location-dot text-gray-700"></i>
                    <span>Barangay 1</span>
                  </td>
                  <td class="py-4">
                    <div class="flex items-center space-x-2">
                      <span class="w-5 h-5 rounded-full bg-red-600 block border border-black"></span>
                      <span>Heavy Busy</span>
                    </div>
                  </td>
                  <td class="py-4 text-center text-lg">28</td>
                  <td class="py-4 text-right text-lg">25 Mins</td>
                </tr>
                <tr>
                  <td class="py-4 flex items-center space-x-2">
                    <i class="fa-solid fa-location-dot text-gray-700"></i>
                    <span>Barangay 2</span>
                  </td>
                  <td class="py-4">
                    <div class="flex items-center space-x-2">
                      <span class="w-5 h-5 rounded-full bg-yellow-400 block border border-black"></span>
                      <span>Moderate</span>
                    </div>
                  </td>
                  <td class="py-4 text-center text-lg">12</td>
                  <td class="py-4 text-right text-lg">15 Mins</td>
                </tr>
                <tr>
                  <td class="py-4 flex items-center space-x-2">
                    <i class="fa-solid fa-location-dot text-gray-700"></i>
                    <span>Barangay 3</span>
                  </td>
                  <td class="py-4">
                    <div class="flex items-center space-x-2">
                      <span class="w-5 h-5 rounded-full bg-emerald-500 block border border-black"></span>
                      <span>Light</span>
                    </div>
                  </td>
                  <td class="py-4 text-center text-lg">9</td>
                  <td class="py-4 text-right text-lg">10 Mins</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl border-2 border-gray-300 shadow-md p-4 space-y-4">
      
      <div class="bg-todahub-cyan rounded-2xl p-5 border border-cyan-400 shadow-sm relative">
        <h3 class="text-2xl font-black text-black mb-1">Wallet</h3>
        <p class="text-sm font-bold text-gray-700 mb-3">Available Balance:</p>
        
        <div class="flex items-center justify-between">
          <div class="flex items-baseline space-x-2 text-4xl font-black text-black">
            <span>₱</span>
            <span>0.00</span>
          </div>
          <button class="text-xl text-black hover:opacity-70">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-2 py-2 text-center">
        <button class="flex flex-col items-center group">
          <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center text-white mb-2 group-hover:bg-gray-800 transition shadow-md">
            <i class="fa-solid fa-wallet text-xl"></i>
          </div>
          <span class="font-extrabold text-sm text-black">Pay</span>
        </button>
        <button class="flex flex-col items-center group">
          <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center text-white mb-2 group-hover:bg-gray-800 transition shadow-md">
            <i class="fa-solid fa-square-plus text-xl"></i>
          </div>
          <span class="font-extrabold text-sm text-black">Top-Up</span>
        </button>
        <button class="flex flex-col items-center group">
          <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center text-white mb-2 group-hover:bg-gray-800 transition shadow-md">
            <i class="fa-solid fa-database text-xl"></i>
          </div>
          <span class="font-extrabold text-sm text-black">Rewards</span>
        </button>
      </div>

      <div class="bg-black rounded-2xl p-4 space-y-3 shadow-inner">
        <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mb-2"></div>
        
        <button class="w-full bg-todahub-cyan text-black text-xl font-black py-3 rounded-full shadow hover:bg-cyan-300 transition tracking-wide">
          Check the Line
        </button>
        
        <button class="w-full bg-todahub-cyan text-black text-xl font-black py-3 rounded-full shadow hover:bg-cyan-300 transition tracking-wide">
          Split a Ride
        </button>
        
        <button class="w-full bg-todahub-cyan text-black text-xl font-black py-3 rounded-full shadow hover:bg-cyan-300 transition tracking-wide">
          My Rides
        </button>
      </div>

    </div>
  </main>

  <footer class="bg-todahub-cyan h-6 w-full border-t border-gray-300"></footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodaHub Mobile Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Custom colors matching the design */
    .bg-todahub-cyan { background-color: #00FFFF; }
    .text-todahub-cyan { color: #00FFFF; }
    .bg-todahub-bg { background-color: #E0FFFF; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-todahub-bg min-h-[850px] shadow-2xl relative flex flex-col justify-between overflow-hidden border border-gray-300">
    
    <header class="p-4 flex justify-end">
      <button class="text-black text-2xl hover:opacity-70 transition">
        <i class="fa-regular fa-bell"></i>
      </button>
    </header>

    <main class="px-6 flex-grow flex flex-col items-center space-y-6 pb-24">
      
      <div class="flex flex-col items-center space-y-2 mt-2">
        <svg class="w-20 h-20 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="12" rx="2" />
          <circle cx="7" cy="18" r="3" />
          <circle cx="17" cy="18" r="3" />
          <path d="M12 3v12" />
        </svg>
        <span class="text-4xl font-black tracking-tight text-black">TodaHub</span>
      </div>

      <div class="w-full bg-todahub-cyan rounded-3xl p-6 border-2 border-black/10 shadow-sm relative">
        <h3 class="text-xl font-extrabold text-black mb-1">Available Balance:</h3>
        
        <div class="flex items-center justify-between mt-2">
          <div class="flex items-baseline space-x-2 text-4xl font-black text-black tracking-tight">
            <span>₱</span>
            <span>1000.25</span>
          </div>
          <button class="text-2xl text-black hover:opacity-70">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4 w-full text-center pt-2">
        <button class="flex flex-col items-center group">
          <div class="w-16 h-16 bg-black rounded-full flex items-center justify-center text-white mb-2 group-hover:bg-gray-800 transition shadow-md">
            <i class="fa-solid fa-wallet text-xl"></i>
          </div>
          <span class="font-bold text-sm text-black">Pay</span>
        </button>
        <button class="flex flex-col items-center group">
          <div class="w-16 h-16 bg-black rounded-full flex items-center justify-center text-white mb-2 group-hover:bg-gray-800 transition shadow-md">
            <i class="fa-solid fa-square-plus text-xl"></i>
          </div>
          <span class="font-bold text-sm text-black">Top-Up</span>
        </button>
        <button class="flex flex-col items-center group">
          <div class="w-16 h-16 bg-black rounded-full flex items-center justify-center text-white mb-2 group-hover:bg-gray-800 transition shadow-md">
            <i class="fa-solid fa-database text-xl"></i>
          </div>
          <span class="font-bold text-sm text-black">Rewards</span>
        </button>
      </div>

      <div class="w-full bg-black rounded-3xl p-5 space-y-4 shadow-xl border border-gray-900">
        <div class="w-14 h-1.5 bg-gray-700 rounded-full mx-auto mb-1"></div>
        
        <button class="w-full bg-todahub-cyan text-black text-xl font-black py-4 rounded-full shadow hover:bg-cyan-300 transition tracking-wide">
          Check the Line
        </button>
        
        <button class="w-full bg-todahub-cyan text-black text-xl font-black py-4 rounded-full shadow hover:bg-cyan-300 transition tracking-wide">
          Split a Ride
        </button>
        
        <button class="w-full bg-todahub-cyan text-black text-xl font-black py-4 rounded-full shadow hover:bg-cyan-300 transition tracking-wide">
          My Rides
        </button>
      </div>

    </main>

    <nav class="absolute bottom-0 left-0 right-0 bg-todahub-cyan py-3 px-6 rounded-t-3xl border-t border-cyan-400 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] flex justify-between items-center z-20">
      <a href="#" class="flex flex-col items-center text-black font-extrabold text-xs space-y-1">
        <i class="fa-solid fa-house text-xl border-b-2 border-black pb-0.5"></i>
        <span>Home</span>
      </a>
      <a href="#" class="flex flex-col items-center text-black/70 hover:text-black font-bold text-xs space-y-1 transition">
        <i class="fa-solid fa-clock-rotate-left text-xl"></i>
        <span>History</span>
      </a>
      <a href="#" class="flex flex-col items-center text-black/70 hover:text-black font-bold text-xs space-y-1 transition">
        <i class="fa-regular fa-envelope text-xl"></i>
        <span>Inbox</span>
      </a>
      <a href="#" class="flex flex-col items-center text-black/70 hover:text-black font-bold text-xs space-y-1 transition">
        <i class="fa-regular fa-user text-xl"></i>
        <span>Me</span>
      </a>
    </nav>

  </div>

</body>
</html>
